<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="./src/ui/assets/mittfavicon.svg">
    <link rel="stylesheet" href="./src/ui/css/root.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboration 2 | Objektorienterad programmering</title>
  </head>
  <body>
    <header class="logo">
      <img width="260" height="150" src="./src/ui/assets/mittlogo.svg" alt="Mittuniversitetet - Logotyp">
    </header>
    <main>
      <h1>Laboration 2</h1>
      <!-- Formuläret som styrs dynamiskt från main-view.ts -->
      <section>
        <h2>Lägg till en att-göra uppgift</h2>
        <form>
          <label for="todo-name">Att göra</label>
          <input type="text" name="todo-name" id="todo-name" placeholder="Gå ut med hunden Fluffy">

          <label for="todo-prio">Prioritet</label>
          <select name="todo-prio" id="todo-prio">
            <option value="1">Hög</option>
            <option value="2">Normal</option>
            <option value="3">Låg</option>
          </select>
          
          <label for="todo-date">Klart senast (YYYY-MM-DD)</label>
          <input type="text" name="todo-date" id="todo-date" placeholder="2026-05-03">

          <input id="add-btn" type="submit" value="Lägg till">

          <p id="add-msg"></p>
        </form>
      </section>
      <section>
        <h2>Att-göra lista</h2>
        <p>Här visas de att-göra-uppgifter som du har lagt till.</p>
        <ul id="todo-list">
          <!-- Elementen i listan genereras dynamiskt -->
        </ul>
      </section>
      <ul id="test"></ul>
    </main>
    <!-- Kör appens huvudfunktionalitet -->
    <script type="module" src="./src/ui/pages/main-page.ts"></script>
  </body>
</html>
