<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="./src/ui/assets/mittfavicon.svg">
    <link rel="stylesheet" href="./src/ui/css/root.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboration 2 | Objektorienterad programmering</title>
  </head>
  <body>
    <header class="logo">
      <img width="260" height="150" src="./src/ui/assets/mittlogo.svg" alt="Mittuniversitetet - Logotyp">
    </header>
    <main>
      <h1>Laboration 2</h1>
      <!-- Formuläret som styrs dynamiskt från main-view.ts -->
      <section>
        <h2>Lägg till en att-göra uppgift</h2>
        <form>
          <label for="course-code">Att göra</label>
          <input type="text" name="course-code" id="course-code" placeholder="dt207g">

          <label for="course-name">Prioritet</label>
          <input type="text" name="course-name" id="course-name" placeholder="Backend-baserad webbutveckling">
          
          <label for="course-prog">Progression</label>
          <input type="text" name="course-prog" id="course-prog" placeholder="A">

          <label for="course-syll">Syllabus</label>
          <input type="text" name="course-syll" id="course-syll" placeholder="http://localhost:5173/">

          <input id="add-btn" type="submit" value="Lägg till">
          <p id="add-msg"></p>
        </form>
      </section>
      <section>
        <h2>Kursöversikt</h2>
        <p>Här visas kurser som du har lagt till.</p>
        <ul id="course-list">
          <!-- Elementen i listan genereras dynamiskt -->
        </ul>
      </section>
    </main>
    <!-- Kör appens huvudfunktionalitet -->
    <script type="module" src="./src/ui/views/main-view.ts"></script>
  </body>
</html>
